<div class="notification-panel">
  <h3>Notifications</h3>
  <button (click)="addNotification()">Add Notification</button>
  <ul>
    <li *ngFor="let note of notificationService.notifications">{{ note }}</li>
  </ul>
  <p *ngIf="notificationService.notifications.length === 0">
    No Notifications Yet
  </p>
</div>
